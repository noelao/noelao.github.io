<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="icon/favicon.ico">
    <link rel="stylesheet" href="css/tyle.css">
    <title>Game</title>

</head>
<body>
    <div class="container">
        <p class="petunjuk">W, A, S, D untuk bergerak L untuk dash ; untuk attack</p>
        <div class="itemsPlayer">
            <div class="itemUse">
                <div class="spell"></div>
                <div class="senjata"></div>
                <div class="armor"></div>
            </div>
            <div class="itemAda">
                <div class="kotak" indexKotak="0"></div>
                <div class="kotak" indexKotak="1"></div>
                <div class="kotak" indexKotak="2"></div>
                <div class="kotak" indexKotak="3"></div>
                <div class="kotak" indexKotak="4"></div>
                <div class="kotak" indexKotak="5"></div>
                <div class="kotak" indexKotak="6"></div>
                <div class="kotak" indexKotak="7"></div>
                <div class="kotak" indexKotak="8"></div>
                <div class="kotak" indexKotak="9"></div>
                <div class="kotak" indexKotak="10"></div>
                <div class="kotak" indexKotak="11"></div>
                <div class="kotak" indexKotak="12"></div>
                <div class="kotak" indexKotak="13"></div>
                <div class="kotak" indexKotak="14"></div>
                <div class="kotak" indexKotak="15"></div>
                <div class="kotak" indexKotak="16"></div>
                <div class="kotak" indexKotak="17"></div>
                <div class="kotak" indexKotak="18"></div>
                <div class="kotak" indexKotak="19"></div>
                <div class="kotak" indexKotak="20"></div>
                <div class="kotak" indexKotak="21"></div>
                <div class="kotak" indexKotak="22"></div>
                <div class="kotak" indexKotak="23"></div>
                <div class="kotak" indexKotak="24"></div>
            </div>
        </div>
        <div class="dari">
            <input type="text" id="chatbox" placeholder="ketik pesan...">
            <button class="kirim">kirim</button>
        </div>
        <div class="enableButton">MOB<br/>ILE</div>
        <div class="mobile button">
            <div class="arah">
                <button class="maju">maju</button>
                <button class="mundur">mundur</button>
                <button class="kanan">kanan</button>
                <button class="kiri">kiri</button>
            </div>
            <div class="skill">
                <button class="pukul">attack</button>
                <button class="dash">dash</button>
            </div>
        </div>
        <canvas>
        </canvas>
    </div>
    <script src="js/condition.js"></script>
    <script src="js/clasess.js"></script>
    <script src="js/game.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/itemplayer.js"></script>
    <script src="js/eventlistener.js"></script>
    <!--  -->
    <script src="js/analog.js"></script>
</body>
</html>
