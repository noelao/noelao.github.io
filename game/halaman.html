<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="../ico/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        body {
            font-family: 'Roboto Mono', monospace;
            margin: 0;
            padding: 0;
            background-color: #1b1b1b;
        }
        .container {
            width: 100%;
            height: 500px;
            display: flex;
            align-items: center;
            justify-items: center;
            flex-direction: column;
        }
        .container .header {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 60px;
            font-size: 25px;
            background-color: #36474F;
        }
        .container .header ul {
            display: flex;
            justify-content: space-between;
            width: 600px;
        }
        li {
            list-style: none;
        }
        a {
            color: #000;
            text-decoration: none;
            transition: all 0.5s;
        }
        a:hover {
            color: #fff;
        }
        .container .items{
            display: flex;
            width: 750px;
            height: 250px;
            /* grid-template-columns: repeat(3,1fr);
            grid-template-rows: repeat(1,1fr);
            grid-template-areas: 
                "siji loro telu"; */
            gap: 5px;
        }
        .container .items .game {
            width: 100%;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.5s;
        }
        .container .items .game:hover {
            width: 150%;
            z-index: 3;
        }
        .container .items .game.siji {
            /* width: 33%; */
            display: flex;
            justify-items: center;
            grid-area: siji;
            background-color: #fff;
            text-align: center;
        }
        .container .items .game.siji a{
            color: aqua;
            text-justify: center;
            border-radius: 15px;
            width: 100%;
            height: 100%;
            background-color: #000;
        }
        .container .items .game.loro {
            display: flex;
            justify-items: center;
            text-align: center;
            grid-area: loro;
            /* grid-area: 33%; */
            background-color: #090;
        }
        .container .items .game.loro a{
            color: aqua;
            text-justify: center;
            border-radius: 15px;
            width: 100%;
            height: 100%;
            background-color: #000;
        }
        .container .items .game.telu {
            display: flex;
            text-align: center;
            grid-area: telu;
            /* grid-area: 33%; */
            background-color: #789;
        }
        .container .items .game.telu a{
            color: aqua;
            text-justify: center;
            border-radius: 15px;
            width: 100%;
            height: 100%;
            background-color: #000;
        }
        h1 {
            color: #fff;
        }

        /* relative */
        @media (max-width:567px) {
            .container .items {
                height: 125px;
                width: 375px;
            }
        }
        /*  */
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <ul>
                <li><a href="../index.html">HOME</a></li>
                <li><a href="">ABOUT</a></li>
                <li><a href="">CONTACT ME</a></li>
            </ul>
        </div>
        <h1>GAME BY JAVASCRIPT</h1>
        <div class="items">
            <div class="game siji">
                <a href="tictactoe/tictactoe.html" target="_blank">
                    <br/>
                    tic tac toe
                </a>
            </div>
            <div class="game loro">
                <a href="ular/ulat.html" target="_blank">
                    <br/>
                    ular
                </a>
            </div>
            <div class="game telu">
                <a href="coba/game.html">
                    <br/>
                    game 2d hmmm...
                </a>
            </div>
        </div>
    </div>
    <script>
        const siji = document.querySelector(".game.siji");
        const jilink = document.querySelector(".game.siji a");
        siji.addEventListener('click', function(){
            jilink
            console.log(jilink);
        })
    </script>
</body>
</html>
