<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Masukkan nilai: <input type="number" id="perkalian" value="5"></p> 
    <button onclick="numbers.forEach(myFunction)">Perkalian</button> 
    <p>Hasil perkalian: <span id="hasil"></span></p>
    <script>
        var numbers = [1,2,3];
        function myFunction(item, index, arr) {
            arr[index] = item * document.getElementById("perkalian").value + " ";
            document.getElementById("hasil").textContent = numbers;
        }
    </script>
</body>
</html>
