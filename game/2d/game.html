<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="favicon.ico">
    <title>Game</title>
    <style>
        html,
        body {
            padding: 0;
            margin: 0;
            font-family: 'Silkscreen', cursive;
        }
        .container {
            /* padding-top: 50px; */
            align-content: center;
            width: 100%;
            display: flex;
            height: 100%;
            justify-content: center;
            /* flex-direction: column; */
            background-color: #000;
            overflow-y: hidden;
        }
        .container .itemsPlayer {
            display: none;
            position: fixed;
            top: 25%;
            width: 500px;
            height: 300px;
            background-color: rgba(49, 49, 49, 0.626);
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .container .itemsPlayer .itemUse {
            width: 30%;
            height: 100%;
            background-color: rgba(49, 49, 49, 0.626);
            margin-right: 10px;
            display: grid;
            padding-left: 5px;
        }
        .container .itemsPlayer .itemUse .spell {
            height: 58px;
            width: 58px;
            background-color: rgba(255, 255, 255, 0.232);
            margin-top: 5px;
            margin-right: 5px;
            cursor:grab;
            font-size: 30px;
            text-align: start;
        }
        .container .itemsPlayer .itemUse .senjata {
            height: 58px;
            width: 58px;
            background-color: rgba(255, 255, 255, 0.232);
            margin-top: 5px;
            margin-right: 5px;
            cursor:grab;
            font-size: 30px;
            text-align: start;
        }
        .container .itemsPlayer .itemUse .armor {
            height: 58px;
            width: 58px;
            background-color: rgba(255, 255, 255, 0.232);
            margin-top: 5px;
            margin-right: 5px;
            cursor:grab;
            font-size: 30px;
            text-align: start;
        }
        .container .itemsPlayer .itemAda {
            width: 70%;
            height: 100%;
            background-color: rgba(49, 49, 49, 0.626);
            display: flex;
            padding-left: 5px;
            flex-wrap: wrap;
            justify-content:  space-between;
            overflow-y: scroll;
        }
        .container .itemsPlayer .itemAda .kotak {
            height: 58px;
            width: 58px;
            background-color: rgba(255, 255, 255, 0.232);
            margin-top: 5px;
            margin-right: 5px;
            cursor:grab;
            font-size: 30px;
            text-align: start;
            /* font-weight: bold; */
        }
        .container p {
            font-size: 20px;
            top: 0;
            position: absolute;
        }
        .container canvas {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .container .dari {
            position: absolute;
            width: 200px;
            height: 30px;
            display: none;
        }
        .container .dari input#chatbox {
            width: 80%;
            overflow: hidden;
        }
        .container .dari button {
            width: 20%;
            text-align: center;
            background-color: rgb(0, 189, 196);
        }
        .container .enableButton{
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #fff;
            border-radius: 5px;
            width: 50px;
            height: 50px;
            text-align: center;
            justify-self: center;
            cursor: pointer;
        }
        .container .mobile.button {
            display: none;
            position: fixed;
            bottom: 10px;
            right: 10px;
            left: 10px;
            height: 400px;
            /* background-color: rgba(255, 255, 255, 0.168); */
            justify-content: space-between;
        }
        .container .mobile.button .arah {
            display: grid;
            height: 100%;
            width: 400px;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }
        /* .container .mobile.button .arah */ button{
            background-color: rgba(46, 46, 46, 0.234);
            border-radius: 10px;
            cursor: pointer;
            border: none ;
        }
        .container .mobile.button .arah .maju {
            grid-column: 2/3;
            grid-row: 1/2;
        }
        .container .mobile.button .arah .mundur {
            grid-column: 2/3;
            grid-row: 3/4;
        }
        .container .mobile.button .arah .kanan {
            grid-column: 3/4;
            grid-row: 2/3;
        }
        .container .mobile.button .arah .kiri {
            grid-column: 1/2;
            grid-row: 2/3;
        }
        .container .mobile.button .skill {
            display: grid;
            height: 100%;
            width: 400px;
        }

    </style>
</head>
<body>
    <div class="container">
        <p class="petunjuk">W, A, S, D untuk bergerak L untuk dash ; untuk attack</p>
        <div class="itemsPlayer">
            <div class="itemUse">
                <div class="spell"></div>
                <div class="senjata"></div>
                <div class="armor"></div>
            </div>
            <div class="itemAda">
                <div class="kotak" indexKotak="0"></div>
                <div class="kotak" indexKotak="1"></div>
                <div class="kotak" indexKotak="2"></div>
                <div class="kotak" indexKotak="3"></div>
                <div class="kotak" indexKotak="4"></div>
                <div class="kotak" indexKotak="5"></div>
                <div class="kotak" indexKotak="6"></div>
                <div class="kotak" indexKotak="7"></div>
                <div class="kotak" indexKotak="8"></div>
                <div class="kotak" indexKotak="9"></div>
                <div class="kotak" indexKotak="10"></div>
                <div class="kotak" indexKotak="11"></div>
                <div class="kotak" indexKotak="12"></div>
                <div class="kotak" indexKotak="13"></div>
                <div class="kotak" indexKotak="14"></div>
                <div class="kotak" indexKotak="15"></div>
                <div class="kotak" indexKotak="16"></div>
                <div class="kotak" indexKotak="17"></div>
                <div class="kotak" indexKotak="18"></div>
                <div class="kotak" indexKotak="19"></div>
                <div class="kotak" indexKotak="20"></div>
                <div class="kotak" indexKotak="21"></div>
                <div class="kotak" indexKotak="22"></div>
                <div class="kotak" indexKotak="23"></div>
                <div class="kotak" indexKotak="24"></div>
            </div>
        </div>
        <div class="dari">
            <input type="text" id="chatbox" placeholder="ketik pesan...">
            <button class="kirim">kirim</button>
        </div>
        <div class="enableButton">MOB<br/>ILE</div>
        <div class="mobile button">
            <div class="arah">
                <button class="maju">maju</button>
                <button class="mundur">mundur</button>
                <button class="kanan">kanan</button>
                <button class="kiri">kiri</button>
            </div>
            <div class="skill">
                <button class="pukul">attack</button>
                <button class="dash">dash</button>
            </div>
        </div>
        <canvas>
        </canvas>
    </div>
    <script src="js/condition.js"></script>
    <script src="js/clasess.js"></script>
    <script src="game.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/itemplayer.js"></script>
    <script src="js/eventlistener.js"></script>
    <!--  -->
    <script src="js/analog.js"></script>
</body>
</html>
