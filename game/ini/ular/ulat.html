<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        body{
            padding: 0;
            margin: 0;
            background-color: #36474F;
        }
        .gameContainer {
            text-align: center;
        }
        #gameBoard {
            border: 3px solid;
        }
        #scoreText {
            font-family: "Permanent Marker", cursive;
            font-size: 100px;
            color: white;
        }
        .resetBtn {
            font-family: "Permanent Marker", cursive;
            font-size: 22px;
            width: 100px;
            height: 50px;
            border: 4px solid;
            border-radius: 15px;
            cursor: pointer;
        }
        .tombol {
            display: none;
        }
        /* relllative mobile */

        @media (max-width:786px) {
            .gameContainer {
                width: 100%;
                display: grid;
                grid-template-columns: 1fr;
                grid-template-rows: repeat(4, auto);
                grid-template-areas: 
                    "board"
                    "score"
                    "reset"
                    "tombol";
            }
            #gameBoard {
                grid-area: board;
            }
            #scoreText {
                grid-area: score;
                font-size: 30px;
            }
            .resetBtn {
                grid-area: reset;
            }
            .tombol {
                justify-content: center;
                width: auto;
                grid-area: tombol;
                display: grid;
                grid-template-columns: 100px 80px 100px;
                grid-template-rows: repeat(2, 60px);
                grid-template-areas: 
                    "kiri atas kanan"
                    "kiri bawah kanan";
            }
            .tombol .kanan{
                grid-area: kanan;
            }
            .tombol .kiri{
                grid-area: kiri;
            }
            .tombol .atas{
                grid-area: atas;
            }
            .tombol .bawah{
                grid-area: bawah;
            }
        }

    </style>
</head>
<body>
    <div class="gameContainer">
        <canvas id="gameBoard" width="500" height="500"></canvas>
        <div id="scoreText">0</div>
        <button class="resetBtn">reset</button>
        <div class="tombol">
            <button class="kanan">kanan</button>
            <button class="kiri">kiri</button>
            <button class="atas">atas</button>
            <button class="bawah">bawah</button>
        </div>
    </div>
    <script src="ulat.js"></script>
</body>
</html>
