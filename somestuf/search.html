<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>search</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
        }
        .search {
            padding: 10px;
            width: inherit;
            color: #eee;
            background: linear-gradient(
                to bottom right,
                #b1227a, #429aee);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search :is(input, button){
            color: inherit;
            border: none;
            background: transparent;
            outline: none;
        }
        .search__input {
            width: 0;
            transition: width .5s;
        }
        .search__btn {
            background-color: #fff;
            width: 25px;
            height: 25px;
            display: grid;
            place-items: center;
            cursor: pointer;
        }
        .search:focus-within input {
            width: 200px;
        }
        ::placeholder {
            color: inherit;
        }
        canvas.makan {
            background-color: #000;
            height: 100px;
            width: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
    <form class="search">
        <input type="text" placeholder="Search" class="search__input">
        <button type="button" class="search__btn">
            <i class="ri-search-2-line">C</i>
        </button>
    </form>
    </div>
    <form action="">
        <p>
            Nama : <input type="text" id="nama">
        </p>
        <p>
            Umur : <input type="text" id="umur">
        </p>
        <p>
            <button onclick="submitdata()">Submit</button>
        </p>
    </form>
    <canvas class="makan" width="100" height="90"></canvas>
    <div class="makan" width="70" height="80"></div>
    <button class="tekan" style="margin-left: 70%;">tekan</button>
    <script>
        function submitdata(){
            var nama = document.getElementById("nama").value;
            console.log(nama);
            pencariIni();
            alert(nama);
        }
        function pencariIni(){
            var dicari = document.getElementsByClassName("form.search input.search__input").value;
            console.log(nama)
            alert(dicari);
            const gg = document.querySelector("form.search input.search__input");
            alert(gg.value);
        }
        const mana = document.querySelector("canvas.makan");
        const itu = mana.height;
        var ini = document.querySelector("button.tekan");
        ini.addEventListener('click', tampilkanAneh)
        function tampilkanAneh(){
            alert(itu);
        }
    </script>
</body>
</html>
