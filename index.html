<!DOCTYPE html>
<html>
    <head>
        <title>
            Hello, World!
        </title>
    </head>
    <body>
        <p>
            Hello, World!
        </p>
        <p>
            This is my first custom website
        </p>
        <svg width="1000" height="250">
            <rect width="150" height="150"  fill="orange">
                <animate attributeName="x" from="0" to="700"
                dur="1s" fill="freeze" repeatCount="1"/>
            </rect>
        </svg>
        <svg width="500" height="500">          <!--M = move to, L = Line to, H, V, C, S, Q, T, A, Z = close path-->
            <path d="M 0 0 L200 200 L200 0 Z"
            style="stroke:#000; fill:none;" />
        </svg>
    </body>
</html>
